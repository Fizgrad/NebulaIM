global:
  scrape_interval: 5s

scrape_configs:
  - job_name: nebula-gateway
    static_configs:
      - targets: ["gateway:9100", "host.docker.internal:9100"]
  - job_name: nebula-user-service
    static_configs:
      - targets: ["user_service:9101", "host.docker.internal:9101"]
  - job_name: nebula-message-service
    static_configs:
      - targets: ["message_service:9102", "host.docker.internal:9102"]
  - job_name: nebula-relation-service
    static_configs:
      - targets: ["relation_service:9103", "host.docker.internal:9103"]
  - job_name: nebula-push-service
    static_configs:
      - targets: ["push_service:9104", "host.docker.internal:9104"]
  - job_name: nebula-conversation-service
    static_configs:
      - targets: ["conversation_service:9105", "host.docker.internal:9105"]
  - job_name: nebula-admin-service
    static_configs:
      - targets: ["admin_service:9106", "host.docker.internal:9106"]
