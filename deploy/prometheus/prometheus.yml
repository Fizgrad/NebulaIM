global:
  scrape_interval: 5s

scrape_configs:
  - job_name: nebula-gateway
    static_configs:
      - targets: ["127.0.0.1:9100"]
  - job_name: nebula-user-service
    static_configs:
      - targets: ["127.0.0.1:9101"]
  - job_name: nebula-message-service
    static_configs:
      - targets: ["127.0.0.1:9102"]
  - job_name: nebula-relation-service
    static_configs:
      - targets: ["127.0.0.1:9103"]
  - job_name: nebula-push-service
    static_configs:
      - targets: ["127.0.0.1:9104"]
  - job_name: nebula-conversation-service
    static_configs:
      - targets: ["127.0.0.1:9105"]
  - job_name: nebula-device-service
    static_configs:
      - targets: ["127.0.0.1:9107"]
  - job_name: nebula-admin-service
    static_configs:
      - targets: ["127.0.0.1:9106"]
