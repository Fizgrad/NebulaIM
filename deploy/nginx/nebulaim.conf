map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_origin $nebula_ws_origin_allowed {
    default 0;
    "" 1;
    "https://nebula.example.com" 1;
}

limit_conn_zone $binary_remote_addr zone=nebulaim_ws_conn:10m;
limit_req_zone $binary_remote_addr zone=nebulaim_ws_req:10m rate=10r/s;

log_format nebulaim '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'request_id=$request_id upstream=$upstream_addr '
                    'upstream_status=$upstream_status request_time=$request_time';

server {
    listen 80;
    server_name nebula.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name nebula.example.com;

    ssl_certificate /etc/letsencrypt/live/nebula.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nebula.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 1m;
    client_header_timeout 10s;
    client_body_timeout 10s;
    large_client_header_buffers 4 8k;

    access_log /var/log/nginx/nebulaim_access.log nebulaim;
    error_log /var/log/nginx/nebulaim_error.log warn;

    location /ws {
        if ($nebula_ws_origin_allowed = 0) {
            return 403;
        }
        limit_conn nebulaim_ws_conn 20;
        limit_req zone=nebulaim_ws_req burst=30 nodelay;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        return 404;
    }
}
