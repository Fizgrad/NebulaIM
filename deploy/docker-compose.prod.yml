services:
  mysql:
    image: mysql:8.0.46
    environment:
      MYSQL_ROOT_PASSWORD: ${NEBULA_MYSQL_ROOT_PASSWORD:?set NEBULA_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nebula_im
      MYSQL_USER: nebula
      MYSQL_PASSWORD: ${NEBULA_MYSQL_PASSWORD:?set NEBULA_MYSQL_PASSWORD}
    ports: !override
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\""]

  redis:
    image: redis:7.2.14
    environment:
      NEBULA_REDIS_PASSWORD: ${NEBULA_REDIS_PASSWORD:?set NEBULA_REDIS_PASSWORD}
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${NEBULA_REDIS_PASSWORD:?set NEBULA_REDIS_PASSWORD}"]
    ports: !override
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${NEBULA_REDIS_PASSWORD}\" ping | grep -q PONG"]

  kafka:
    image: apache/kafka:3.7.0
    ports: !override
      - "127.0.0.1:9092:9092"

  prometheus:
    ports: !override
      - "127.0.0.1:9090:9090"

  grafana:
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${NEBULA_GRAFANA_PASSWORD:?set NEBULA_GRAFANA_PASSWORD}

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: !override
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4318:4318"
